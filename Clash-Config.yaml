proxy-providers:
  ALL:
    type: http
    url: "https://raw.githubusercontent.com/MaxLansquenet/Clash/refs/heads/master/Clash-Android.yaml" # 订阅链接
    path: "./ALL.yaml" # 配置文件缓存的位置
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204
    proxy: 🎯 GitHub

mixed-port: 8086
allow-lan: true
mode: Rule
log-level: warning
external-controller: 0.0.0.0:9097   

proxy-groups:

  - name: To-HK
    type: url-test
    include-all: true
    filter: "HK|香港|hk|hongkong|hong kong"
    url: https://store.steampowered.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
    
  - name: To-TW
    type: url-test
    include-all: true
    filter: "台湾|TW"
    url: https://store.steampowered.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
    
  - name: To-SG
    type: url-test
    include-all: true
    filter: "新家坡|SG"
    url: https://store.steampowered.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
    
  - name: To-JP
    type: url-test
    include-all: true
    filter: "🇯🇵|日本|JP"
    url: https://store.steampowered.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
    
  - name: To-KR
    type: url-test
    include-all: true
    filter: "🇰🇷|韩国|KR"
    url: https://store.steampowered.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
    
  - name: In-CN
    type: url-test
    include-all: true
    filter: "CN|中国|中國|cn"
    url: https://store.steampowered.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
    
  - name: Š Steam
    type: select
    include-all: true
    exclude-filter: "CN|中国|渗透|中國|cn|未知"
    url: https://store.steampowered.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - DIRECT

  - name: 🚀 节点选择
    type: select
    include-all: true
    exclude-filter: "渗透|未知"
    proxies:
        - To-TW
        - To-HK
        - To-KR
        - To-JP
        - To-SG
        - To-JP
  - name: ♻️ 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    exclude-filter: "渗透|未知"
    proxies:
    
  - name: 🌍 国外媒体
    type: select
    include-all: true
    proxies:
      - 🎯 全球直连
 
  - name: 🎯 GitHub
    type: url-test
    url: https://www.github.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    exclude-filter: "渗透|未知"
    strategy: consistent-hashing   #round-robin
    proxies:

  - name: 🎥 奈飞视频
    type: url-test
    url: https://www.netflix.com/generate_204
    include-all: true
    interval: 300
    tolerance: 50
    strategy: consistent-hashing   #round-robin
    exclude-filter: "渗透|未知"
    proxies:

  - name: 📹 油管视频
    type: url-test
    url: https://www.youtube.com/generate_204
    include-all: true
    interval: 300
    tolerance: 50
    strategy: consistent-hashing   #round-robin
    exclude-filter: "渗透|未知"   # "HK|香港|hk|hongkong|hong kong|CN|中国|渗透|中國|cn|未知"
    proxies:

  - name: 🎥 Tiktok
    type: url-test
    url: https://www.tiktok.com
    include-all: true
    interval: 300
    tolerance: 50
    strategy: consistent-hashing   #round-robin
    exclude-filter: "渗透|未知|HK|香港|hk|hongkong|hong kong"
    proxies:
    
  - name: 💬 OpenAi
    type: url-test
    url: https://www.chatgpt.com
    include-all: true
    interval: 300
    tolerance: 50
    strategy: consistent-hashing   #round-robin
    exclude-filter: "渗透|未知"
    proxies:


  - name: 📲 电报信息
    type: url-test
    url: https://www.telegram.org/generate_204
    include-all: true
    interval: 300
    tolerance: 50
    strategy: consistent-hashing   #round-robin
    exclude-filter: "渗透|未知"
    proxies:

  - name: Ⓜ️ 微软服务
    type: url-test
    url: http://www.msftncsi.com/ncsi.txt
    include-all: true
    interval: 300
    tolerance: 50
    strategy: consistent-hashing   #round-robin
    exclude-filter: "渗透|未知"
    proxies:

  - name: 🍎 苹果服务
    type: url-test
    url: http://captive.apple.com
    include-all: true
    interval: 300
    tolerance: 50
    strategy: consistent-hashing   #round-robin
    exclude-filter: "渗透|未知"
    proxies:

  - name: 📢 谷歌FCM
    type: url-test
    url: http://www.google.com/blank.html
    include-all: true
    strategy: consistent-hashing   #round-robin
    interval: 300
    tolerance: 50
    exclude-filter: "渗透|未知"
    proxies:

  - name: ✍ Mozilla
    type: url-test
    url: http://detectportal.firefox.com/success.txt
    include-all: true
    strategy: consistent-hashing   #round-robin
    interval: 300
    tolerance: 50
    exclude-filter: "渗透|未知"
    proxies:
    
  - name: APK_Apkpure
    type: url-test
    url: http://apkpure.com/
    include-all: true
    strategy: consistent-hashing   #round-robin
    interval: 300
    tolerance: 50
    exclude-filter: "渗透|未知"
    proxies:

  - name: 🎯 全球直连
    type: select
    proxies:
      - ♻️ 自动选择
      - 🚀 节点选择
      - 🐟 漏网之鱼
      - DIRECT

  - name: 🛑 全球拦截
    type: select
    proxies:
      - REJECT
      - 🎯 全球直连

  - name: 🍃 应用净化
    type: select
    proxies:
      - REJECT
      - 🎯 全球直连

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT

